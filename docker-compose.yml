services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: flow
      POSTGRES_DB: flow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

  registry:
    image: registry:2
    # Host port 5001, not 5000: on macOS the Control Center AirPlay Receiver squats on :5000
    # and silently swallows pushes. The registry still listens on 5000 inside the container.
    ports:
      - "5001:5000"
    volumes:
      - registrydata:/var/lib/registry

volumes:
  pgdata:
  registrydata:
